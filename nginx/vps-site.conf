# gmont.ru — Next.js за nginx на VPS
#
# ПЕРЕД первым включением HTTPS на сервере нужны сертификаты Let's Encrypt.
# См. nginx/README-ssl.md в этом репозитории.
#
# Пути к сертификатам (стандарт Certbot):
#   /etc/letsencrypt/live/gmont.ru/fullchain.pem
#   /etc/letsencrypt/live/gmont.ru/privkey.pem

upstream nextjs_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP: проверка Let's Encrypt + редирект всего остального на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name gmont.ru www.gmont.ru;

    client_max_body_size 25M;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — основной сайт
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name gmont.ru www.gmont.ru;

    ssl_certificate     /etc/letsencrypt/live/gmont.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gmont.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 25M;

    location / {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
